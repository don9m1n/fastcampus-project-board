<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 페이지</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <script defer th:src="@{/js/bootstrap.min.js}"></script>
</head>
<body class="d-flex flex-column min-vh-100">
    <header th:replace="layout/header::header"></header>

    <main class="container flex-grow-1">
        <header class="py-5 text-center">
            <h1>첫번째 글</h1>
        </header>

        <div class="row g-5">
            <section class="col-md-5 col-lg-4 order-md-last">
                <aside>
                    <p><span class="nick-name badge bg-warning">동민</span></p>
                    <p><a class="u-url" rel="me" href="mailto:test@gmail.com">test@mail.com</a></p>
                    <p><time datetime="2022-01-01T00:00:00">2023-07-17</time></p>
                    <p class="badge bg-warning">#java</p>
                </aside>
            </section>

            <article class="col-md-7 col-lg-8">
                <p>본문<br><br></p>
            </article>
        </div>

        <div class="row g-5">
            <section>
                <form class="row g-3">
                    <div class="col-8">
                        <label for="comment-textbox" hidden>댓글</label>
                        <textarea class="form-control" id="comment-textbox" placeholder="댓글 쓰기.." rows="3"></textarea>
                    </div>
                    <div class="col-auto">
                        <label for="comment-submit" hidden>댓글 쓰기</label>
                        <button class="btn btn-primary" id="comment-submit" type="submit">쓰기</button>
                    </div>
                </form>

                <ul>
                    <li>
                        <div>
                            <time><small>2023-07-15</small></time>
                            <strong>혜정</strong>
                            <p>
                                화면 잘 만들었다 ㅎㅎ~
                            </p>
                        </div>
                    </li>
                    <li>
                        <div>
                            <time><small>2023-07-17</small></time>
                            <strong>은빈</strong>
                            <p>
                                첫 번째 글을 축하합니다~
                            </p>
                        </div>
                    </li>
                </ul>
            </section>
        </div>

        <div class="row g-5">
            <nav aria-label="Page navigation example">
                <ul class="pagination justify-content-center">
                    <li class="page-item">
                        <a class="page-link" href="#" aria-label="Previous">
                            <span aria-hidden="true">이전글</span>
                        </a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="#" aria-label="Next">
                            <span aria-hidden="true">다음글</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <footer th:replace="layout/footer::footer"></footer>
</body>
</html>
